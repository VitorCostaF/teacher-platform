spring.application.name=Teacher-Platform

spring.datasource.url=jdbc:postgresql://localhost:5432/teacher_platform
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LW5vdC1mb3ItcHJvZA==
app.jwt.access-token-expiration=3600
app.jwt.refresh-token-expiration=2592000

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Rate limit / bloqueio de conta
app.auth.max-attempts=5
app.auth.lockout-minutes=15
app.auth.rate-limit-per-minute=10

# Claude API (IA)
app.ia.api-key=${ANTHROPIC_API_KEY:changeme}
app.ia.api-url=https://api.anthropic.com/v1/messages
app.ia.model=claude-sonnet-4-6
app.ia.max-tokens=4096
app.ia.rate-limit-por-hora=20

# Upload de documentos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Garantir modo servlet com WebFlux no classpath
spring.main.web-application-type=servlet

# Relatórios PDF
app.storage.pdf-base-url=http://localhost:8080/relatorios
app.storage.pdf-dir=./uploads/relatorios
app.relatorio.url-validade-horas=24
